name: 检测云·原神背景图更新

on:
  # 每7天自动运行（周一 UTC 00:00）
  schedule:
    - cron: '0 0 * * 1'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-background:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl python3

      - name: 检测背景图更新
        id: check
        run: |
          chmod +x scripts/check_bg.sh
          bash scripts/check_bg.sh

      - name: 提交更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add images/ -f

          MD5="${{ steps.check.outputs.md5 }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          git commit -m "🎨 背景图更新 [${MD5:0:8}]" \
            -m "检测时间: ${TIMESTAMP}" \
            -m "MD5: ${MD5}" \
            -m "自动检测并保存新的云·原神背景图"

          git push

      - name: 无变化
        if: steps.check.outputs.changed != 'true'
        run: echo "✅ 背景图未变化，无需提交"
